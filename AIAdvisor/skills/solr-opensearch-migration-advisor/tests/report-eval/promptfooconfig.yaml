# Migration Advisor — 4-Tier Report Quality Eval
#
# Tiers:
#   T1  Deterministic (MCP stdio)        — Python only, no LLM
#   T2  LLM + Skill + OS Mapping         — skill context + pre-converted mapping
#   T3  LLM + Skill, No OS Mapping       — skill context + raw schema only
#   T4  LLM + MCP Tools                  — full integration (Claude CLI + MCP)
#
# Usage:
#   bash run_eval.sh              # all 4 tiers
#   bash run_eval.sh --tier 1     # deterministic only (free, instant)
#   bash run_eval.sh --tier 2     # LLM + skill + mapping
#   bash run_eval.sh --tier 3     # LLM + skill, no mapping
#   bash run_eval.sh --tier 4     # LLM + MCP tools
#   bash run_eval.sh --mcp-only   # alias for --tier 1

description: "Migration Advisor — 4-Tier Report Quality Eval"

prompts:
  - id: migration-report
    label: "Full migration report request"
    raw: "{{query}}"

providers:
  - id: "exec:python3 mcp_provider.py"
    label: "T1 Deterministic (MCP stdio)"
  - id: "exec:python3 skill_llm_with_mapping_provider.py"
    label: "T2 LLM + Skill + OS Mapping"
  - id: "exec:python3 skill_llm_no_mapping_provider.py"
    label: "T3 LLM + Skill, No OS Mapping"
  - id: "exec:python3 claude_provider.py"
    label: "T4 LLM + MCP Tools"

tests:
  - description: "Schema + queries → complete migration report with stage plan"
    vars:
      query: |
        I am a Search Engineer migrating from Solr to OpenSearch.

        Here is my Solr schema:
        <schema name="ecommerce" version="1.6">
          <fieldType name="string" class="solr.StrField" sortMissingLast="true"/>
          <fieldType name="pint" class="solr.IntPointField" docValues="true"/>
          <fieldType name="text_general" class="solr.TextField" positionIncrementGap="100">
            <analyzer type="index">
              <tokenizer class="solr.StandardTokenizerFactory"/>
              <filter class="solr.LowerCaseFilterFactory"/>
            </analyzer>
          </fieldType>
          <fieldType name="location" class="solr.LatLonPointSpatialField" docValues="true"/>
          <fieldType name="pdate" class="solr.DatePointField" docValues="true"/>

          <field name="id" type="string" indexed="true" stored="true" required="true"/>
          <field name="title" type="text_general" indexed="true" stored="true"/>
          <field name="price" type="pint" indexed="true" stored="true"/>
          <field name="location" type="location" indexed="true" stored="true"/>
          <field name="created_at" type="pdate" indexed="true" stored="true"/>
          <copyField source="title" dest="title_sort"/>
        </schema>

        Here are my representative queries:
        - title:opensearch AND price:[10 TO 100]

        I use SolrJ as my client library.

        Please convert the schema, translate the queries, and generate
        a complete migration report including the stage plan.
    assert:
      # --- Schema mapping correctness ---
      - type: contains
        value: "geo_point"
        metric: spatial_mapping
      - type: contains
        value: "keyword"
        metric: string_mapping
      - type: icontains
        value: "integer"
        metric: int_mapping
      - type: contains
        value: "date"
        metric: date_mapping

      # --- Report structure (all 7 canonical sections) ---
      - type: icontains
        value: "Migration Report"
        metric: report_present
      - type: icontains
        value: "incompatibilities"
        metric: has_incompatibilities_section
      - type: icontains
        value: "client"
        metric: has_client_section
      - type: icontains
        value: "stage plan"
        metric: has_stage_plan
      - type: icontains
        value: "milestones"
        metric: has_milestones_section
      - type: icontains
        value: "blockers"
        metric: has_blockers_section
      - type: icontains
        value: "implementation"
        metric: has_implementation_section
      - type: icontains
        value: "cost"
        metric: has_cost_section

      # --- Stage plan quality ---
      - type: icontains
        value: "target validation"
        metric: stage_plan_has_target_validation
      - type: icontains
        value: "success criteria"
        metric: stage_plan_has_criteria
      - type: icontains
        value: "stop conditions"
        metric: stage_plan_has_stop_conditions

      # --- Incompatibility detection ---
      - type: icontains
        value: "copy_to"
        metric: copyfield_flagged

      # --- Content: client integration ---
      - type: icontains
        value: "SolrJ"
        metric: client_integration_mentioned
