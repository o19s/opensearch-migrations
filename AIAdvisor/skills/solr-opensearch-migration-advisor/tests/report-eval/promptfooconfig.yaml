# Migration Advisor — 4-Tier Report Quality Eval
#
# Tiers:
#   T1  Deterministic (MCP stdio)        — Python only, no LLM
#   T2  LLM + Skill + OS Mapping         — skill context + pre-converted mapping
#   T3  LLM + Skill, No OS Mapping       — skill context + raw schema only
#   T4  LLM + MCP Tools                  — full integration (Claude CLI + MCP)
#
# Usage:
#   bash run_eval.sh              # all 4 tiers
#   bash run_eval.sh --tier 1     # deterministic only (free, instant)
#   bash run_eval.sh --tier 2     # LLM + skill + mapping
#   bash run_eval.sh --tier 3     # LLM + skill, no mapping
#   bash run_eval.sh --tier 4     # LLM + MCP tools
#   bash run_eval.sh --mcp-only   # alias for --tier 1

description: "Migration Advisor — 4-Tier Report Quality Eval"

prompts:
  - id: migration-report
    label: "Full migration report request"
    raw: "{{query}}"

providers:
  - id: "exec:python3 mcp_provider.py"
    label: "T1 Deterministic (MCP stdio)"
  - id: "exec:python3 skill_llm_with_mapping_provider.py"
    label: "T2 LLM + Skill + OS Mapping"
  - id: "exec:python3 skill_llm_no_mapping_provider.py"
    label: "T3 LLM + Skill, No OS Mapping"
  - id: "exec:python3 claude_provider.py"
    label: "T4 LLM + MCP Tools"

tests:
  - description: "Schema + queries → complete migration report with stage plan"
    vars:
      query: |
        I am a Search Engineer migrating from Solr to OpenSearch.

        Here is my Solr schema:
        <schema name="ecommerce" version="1.6">
          <fieldType name="string" class="solr.StrField" sortMissingLast="true"/>
          <fieldType name="pint" class="solr.IntPointField" docValues="true"/>
          <fieldType name="text_general" class="solr.TextField" positionIncrementGap="100">
            <analyzer type="index">
              <tokenizer class="solr.StandardTokenizerFactory"/>
              <filter class="solr.LowerCaseFilterFactory"/>
            </analyzer>
          </fieldType>
          <fieldType name="location" class="solr.LatLonPointSpatialField" docValues="true"/>
          <fieldType name="pdate" class="solr.DatePointField" docValues="true"/>

          <field name="id" type="string" indexed="true" stored="true" required="true"/>
          <field name="title" type="text_general" indexed="true" stored="true"/>
          <field name="price" type="pint" indexed="true" stored="true"/>
          <field name="location" type="location" indexed="true" stored="true"/>
          <field name="created_at" type="pdate" indexed="true" stored="true"/>
          <copyField source="title" dest="title_sort"/>
        </schema>

        Here are my representative queries:
        - title:opensearch AND price:[10 TO 100]

        I use SolrJ as my client library.

        Please convert the schema, translate the queries, and generate
        a complete migration report including the stage plan.
    assert:
      # --- Schema mapping correctness ---
      - type: contains
        value: "geo_point"
        metric: spatial_mapping
      - type: contains
        value: "keyword"
        metric: string_mapping
      - type: icontains
        value: "integer"
        metric: int_mapping
      - type: contains
        value: "date"
        metric: date_mapping

      # --- Report structure (concept-level, not exact T1 headings) ---
      - type: icontains
        value: "migration report"
        metric: report_present
      - type: icontains-any
        value:
          - "incompatibilities"
          - "incompatibility"
          - "breaking"
        metric: has_incompatibilities_section
      - type: icontains-any
        value:
          - "client"
          - "SolrJ"
          - "opensearch-java"
        metric: has_client_section
      - type: icontains-any
        value:
          - "stage plan"
          - "staged migration"
          - "migration stage"
          - "migration plan"
          - "cutover"
        metric: has_migration_plan
      - type: icontains-any
        value:
          - "milestones"
          - "milestone"
          - "phase"
          - "week"
          - "timeline"
        metric: has_phased_plan
      - type: icontains-any
        value:
          - "blockers"
          - "blocker"
          - "risk"
          - "open items"
        metric: has_blockers_or_risks
      - type: icontains-any
        value:
          - "implementation"
          - "action"
          - "effort"
          - "checklist"
        metric: has_actionable_items
      - type: icontains-any
        value:
          - "cost"
          - "effort"
          - "infrastructure"
          - "estimated"
        metric: has_cost_or_effort

      # --- Migration plan quality (concept-level) ---
      - type: icontains-any
        value:
          - "target validation"
          - "schema"
          - "mapping"
          - "index created"
        metric: plan_has_validation_step
      - type: icontains-any
        value:
          - "success criteria"
          - "validated"
          - "verified"
          - "document count"
          - "smoke"
        metric: plan_has_verification
      - type: icontains-any
        value:
          - "stop conditions"
          - "rollback"
          - "revert"
          - "fail"
        metric: plan_has_rollback_awareness

      # --- Incompatibility detection ---
      - type: icontains
        value: "copy_to"
        metric: copyfield_flagged

      # --- Content: client integration ---
      - type: icontains
        value: "SolrJ"
        metric: client_integration_mentioned

      # --- Qualitative rubrics ---
      - type: llm-rubric
        metric: incompatibilities_quality
        value: >
          The report identifies the most important Solr-to-OpenSearch
          incompatibilities raised by the input, distinguishes between severity
          or impact levels where appropriate, and gives concrete remediation
          guidance rather than only naming the issue.
      - type: llm-rubric
        metric: client_migration_quality
        value: >
          The report treats client migration as an application change, not just
          a terminology swap. It gives a plausible migration direction for the
          stated client technology and explains at least one concrete
          implication for code, APIs, or integration behavior.
      - type: llm-rubric
        metric: migration_plan_quality
        value: >
          The report presents a staged migration plan that is operationally
          useful. It includes validation steps, success criteria or
          verification, and explicit stop conditions, rollback thinking, or
          other risk controls rather than only listing generic implementation
          tasks.
      - type: llm-rubric
        metric: index_design_quality
        value: >
          The report shows sound index-design judgment, not just field-type
          conversion. It explains meaningful mapping or analyzer decisions
          implied by the schema, addresses copyField or similar structural
          patterns when relevant, and demonstrates that the target OpenSearch
          design is intentional rather than a mechanical one-to-one rewrite.
      - type: llm-rubric
        metric: stakeholder_coverage_quality
        value: >
          The report identifies which stakeholder groups are materially affected
          by the migration and explains why when that is relevant to the input
          or migration plan. It goes beyond generic audience labels by tying
          impacts or decisions to concrete roles such as search owners,
          developers, operators, product stakeholders, or business users.
