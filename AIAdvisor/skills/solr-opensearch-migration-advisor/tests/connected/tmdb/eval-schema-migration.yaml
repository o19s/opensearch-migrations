description: "TMDB text-heavy scenario — agent inspects live Solr and plans migration"

providers:
  - id: 'file://../../evals/claude_requests.py'
    label: 'Claude agent invocation'
    config:
      timeout: 3000000

defaultTest:
  options:
    provider:
      id: bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0
      config:
        region: us-east-1
        max_tokens: 256

prompts:
  - id: tmdb-migration-prompt
    label: "TMDB migration advisor"
    raw: "{{query}}"

tests:
  - description: "Introduce TMDB migration need"
    metadata:
      continue: false
    vars:
      query: |
        I'm a Search Relevance Engineer. I need to migrate our TMDB movie search
        from Solr 8.11 to OpenSearch.
    assert:
      - type: llm-rubric
        value: >-
          Response acknowledges the migration need and asks clarifying questions
          (e.g. for schema, Solr version confirmation, or user role).
        metric: tmdb-intro

  - description: "Provide TMDB schema and request migration plan"
    metadata:
      continue: true
    vars:
      query: |
        Here is our Solr schema (trimmed to core fields):

        <schema name="tmdb" version="1.6">
          <fieldType name="string" class="solr.StrField" sortMissingLast="true"/>
          <fieldType name="pint" class="solr.IntPointField" docValues="true"/>
          <fieldType name="pfloat" class="solr.FloatPointField" docValues="true"/>
          <fieldType name="pdate" class="solr.DatePointField" docValues="true"/>
          <fieldType name="plong" class="solr.LongPointField" docValues="true"/>
          <fieldType name="text_general" class="solr.TextField" positionIncrementGap="100">
            <analyzer type="index">
              <tokenizer class="solr.StandardTokenizerFactory"/>
              <filter class="solr.StopFilterFactory" ignoreCase="true" words="stopwords.txt"/>
              <filter class="solr.LowerCaseFilterFactory"/>
            </analyzer>
            <analyzer type="query">
              <tokenizer class="solr.StandardTokenizerFactory"/>
              <filter class="solr.StopFilterFactory" ignoreCase="true" words="stopwords.txt"/>
              <filter class="solr.SynonymGraphFilterFactory" synonyms="synonyms.txt" ignoreCase="true" expand="true"/>
              <filter class="solr.LowerCaseFilterFactory"/>
            </analyzer>
          </fieldType>

          <field name="id" type="string" indexed="true" stored="true" required="true"/>
          <field name="title" type="text_general" indexed="true" stored="true" termVectors="true"/>
          <field name="overview" type="text_general" indexed="true" stored="true"/>
          <field name="tagline" type="text_general" indexed="true" stored="true"/>
          <field name="cast" type="text_general" indexed="true" stored="true" multiValued="true"/>
          <field name="directors" type="text_general" indexed="true" stored="true" multiValued="true"/>
          <field name="genres" type="text_general" indexed="true" stored="true" multiValued="true"/>
          <field name="genres_s" type="string" indexed="true" stored="true" multiValued="true"/>
          <field name="release_date" type="pdate" indexed="true" stored="true"/>
          <field name="vote_average" type="pfloat" indexed="true" stored="true"/>
          <field name="vote_count" type="pint" indexed="true" stored="true"/>
          <field name="text_all" type="text_general" indexed="true" stored="true" multiValued="true"/>

          <copyField source="title" dest="text_all"/>
          <copyField source="overview" dest="text_all"/>
          <copyField source="tagline" dest="text_all"/>
          <copyField source="cast" dest="text_all"/>
          <copyField source="directors" dest="text_all"/>
          <copyField source="genres" dest="text_all"/>
          <copyField source="genres" dest="genres_s"/>
        </schema>

        We also use Querqy for query rewriting (querqy-solr-5.1 JAR) and have
        extensive synonym files (synonyms.txt, synonyms_bidirect.txt, synonyms_directed.txt).
        The default query parser is eDisMax.

        Please produce a migration plan with OpenSearch index mappings.
    assert:
      - type: llm-rubric
        value: >-
          Response includes a complete OpenSearch index mapping as a JSON code block
          that could be used in a PUT request.
        metric: json-mapping
      - type: llm-rubric
        value: >-
          Response maps text-heavy fields (title, overview, cast, directors) to
          OpenSearch text type with appropriate analyzers.
        metric: field-mapping
      - type: llm-rubric
        value: >-
          Response mentions Solr copyField and explains the OpenSearch equivalent
          (copy_to) for the text_all catch-all field.
        metric: copy-fields
      - type: llm-rubric
        value: >-
          Response mentions that synonym files need to be migrated to OpenSearch.
        metric: synonyms
      - type: llm-rubric
        value: >-
          Response identifies Querqy as a plugin dependency and mentions
          that an OpenSearch equivalent exists (querqy-opensearch).
        metric: querqy-plugin
