# SolrCloud 8 with TechProducts collection and sample data.
# Single ZK + single Solr node. Port 38983 avoids conflicts with local dev.
#
# Usage:
#   docker compose up -d
#   docker compose down -v

services:
  zookeeper:
    image: zookeeper:3.9
    ports:
      - "32181:2181"

  solr:
    image: solr:8
    ports:
      - "38983:8983"
    depends_on:
      - zookeeper
    command: >
      bash -c "
        solr start -cloud -z zookeeper:2181 -f &
        sleep 10 &&
        solr create_collection -c techproducts -d sample_techproducts_configs -n techproducts &&
        /opt/solr/bin/post -c techproducts /opt/solr/example/exampledocs/*.xml &&
        wait
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/techproducts/admin/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
