# =============================================================================
# Step 3: Promptfoo with INLINE prompt (all content lives in THIS file)
# =============================================================================
#
# PURPOSE
# -------
# Demonstrates the simplest way to use promptfoo: paste the entire system
# prompt directly into the YAML. No external files, no generation step.
#
# WHAT'S LOADED
# -------------
# Only nugget 1 (Express Mode rules) is pasted into the prompt below.
# Nuggets 2 and 3 are NOT included. This is deliberate — it proves that
# missing skill content causes the corresponding assertions to fail.
#
# EXPECTED RESULTS
# ----------------
#   Test 1 (EXPRESS MODE banner)  → PASS  (nugget 1 is loaded)
#   Test 2 (BM25 vs TF-IDF)      → FAIL  (nugget 2 NOT loaded)
#   Test 3 (opensearch-java)      → FAIL  (nugget 3 NOT loaded)
#
# COMPARE WITH
# ------------
# promptfooconfig-external.yaml — same 3 assertions, but the prompt is loaded
# from an external file (file://skill-assembled.txt) that includes ALL 3
# nuggets, so all 3 tests pass.  See README.md § "Why two promptfoo config
# files?" and PROMPTFOO.md for a full explanation.
#
# HOW TO RUN
# ----------
#   npx promptfoo eval --config promptfooconfig-inline.yaml --no-cache
#   npx promptfoo view    # interactive results browser
#
# Or via the orchestrator:
#   ./run_smoke.sh --step 3
#
# =============================================================================

description: "skill-smoke step 3 — promptfoo inline (1 nugget hardcoded)"

# ---------------------------------------------------------------------------
# Provider: which LLM to call
# ---------------------------------------------------------------------------
# We use Amazon Bedrock's Nova Micro (cheapest model) by default.
# Override at runtime:  SMOKE_MODEL=amazon.nova-pro-v1:0 npx promptfoo eval ...
providers:
  - id: "bedrock:{{env.SMOKE_MODEL | default('amazon.nova-micro-v1:0')}}"
    label: migration-advisor-inline
    config:
      region: "{{env.AWS_DEFAULT_REGION | default('us-east-1')}}"
      max_tokens: 500

# ---------------------------------------------------------------------------
# Prompt template
# ---------------------------------------------------------------------------
# {{prompt}} is replaced with the value of vars.prompt from each test below.
# This indirection lets each test provide its own prompt content.
prompts:
  - "{{prompt}}"

# ---------------------------------------------------------------------------
# Tests
# ---------------------------------------------------------------------------
# All 3 tests send the SAME user question. The only difference is which
# assertions they check. The prompt includes only nugget 1 (Express Mode),
# so only the first assertion should pass.
#
# NOTE: promptfoo will exit with code 1 when assertions fail. That's expected.
# run_smoke.sh --step 3 handles this gracefully.
# ---------------------------------------------------------------------------

tests:
  # --- Test 1/3: EXPRESS MODE banner ---
  # This SHOULD PASS because nugget 1 is pasted inline below.
  - description: "1/3: EXPRESS MODE banner present (nugget 1 is loaded inline)"
    vars:
      prompt: |
        You are a Solr-to-OpenSearch migration advisor.

        ## Express Mode (YOLO)
        Trigger: user says "YOLO", "express mode", or "just do it".

        Rules when express mode is active:
        1. Open your response with this exact line (verbatim):
           EXPRESS MODE — GENERATED WITH ASSUMPTIONS
        2. Mark every gap-filling choice with: [ASSUMED: <what and why>]
        3. Do NOT ask clarifying questions. Use expert defaults and mark them.

        ---
        User: YOLO — list the 3 most critical things to address when migrating from Solr 8 to OpenSearch.
    assert:
      - type: icontains
        value: "EXPRESS MODE"
        description: "Nugget 1 is in play → model uses the express mode banner"

  # --- Test 2/3: BM25 incompatibility ---
  # This SHOULD FAIL because nugget 2 is NOT loaded.
  # The LLM has no specific instruction to call out "BM25 vs TF-IDF".
  # It might mention BM25 from general training knowledge, but it won't
  # reliably use the exact phrase "BM25 vs TF-IDF" without the nugget.
  - description: "2/3: BM25 incompatibility (nugget 2 NOT loaded — expect FAIL)"
    vars:
      prompt: |
        You are a Solr-to-OpenSearch migration advisor.

        ## Express Mode (YOLO)
        Trigger: user says "YOLO", "express mode", or "just do it".
        Rules: open with "EXPRESS MODE — GENERATED WITH ASSUMPTIONS", mark [ASSUMED: ...].

        ---
        User: YOLO — list the 3 most critical things to address when migrating from Solr 8 to OpenSearch.
    assert:
      - type: icontains
        value: "BM25 vs TF-IDF"
        description: "Nugget 2 NOT loaded → expect FAIL (proves the skill is needed)"

  # --- Test 3/3: opensearch-java client migration ---
  # This SHOULD FAIL because nugget 3 is NOT loaded.
  - description: "3/3: opensearch-java client migration (nugget 3 NOT loaded — expect FAIL)"
    vars:
      prompt: |
        You are a Solr-to-OpenSearch migration advisor.

        ## Express Mode (YOLO)
        Trigger: user says "YOLO", "express mode", or "just do it".
        Rules: open with "EXPRESS MODE — GENERATED WITH ASSUMPTIONS", mark [ASSUMED: ...].

        ---
        User: YOLO — list the 3 most critical things to address when migrating from Solr 8 to OpenSearch.
    assert:
      - type: icontains
        value: "opensearch-java"
        description: "Nugget 3 NOT loaded → expect FAIL (proves the skill is needed)"
