# Skill Impact Eval — Before/After Paired Test
#
# Proves that the migration advisor's steering content measurably
# changes LLM output. Two prompts, same question:
#   1. "bare" — no skill context (generic LLM)
#   2. "with-skill" — SKILL.md + steering injected as system prompt
#
# The "bare" variant should FAIL assertions (generic answer).
# The "with-skill" variant should PASS assertions (precise answer).
#
# Provider: Amazon Bedrock (required). Override with PROMPTFOO_PROVIDER env var.
#
# Usage:
#   bash run_impact_demo.sh           # uses Bedrock (default)
#   bash run_impact_demo.sh --ollama  # uses local Ollama instead

prompts:
  - id: bare
    label: "WITHOUT skill context"
    raw: "{{query}}"

  - id: with-skill
    label: "WITH skill context"
    raw: |
      {{system_prompt}}

      ---

      User question: {{query}}

providers:
  - id: "bedrock:amazon.nova-lite-v1:0"
    config:
      temperature: 0

tests:
  - description: "Solr spatial + copyField migration"
    vars:
      query: >
        I have a Solr schema with these fields:
        - A field named "location" using LatLonPointSpatialField
        - A copyField directive: <copyField source="title" dest="title_sort"/>
        - A field named "price" using TrieIntField
        - A text field with StandardTokenizerFactory and LowerCaseFilterFactory

        What OpenSearch mapping should I create? List the field types
        and flag any incompatibilities.
      system_prompt: "file://system-prompt-assembled.txt"
    assert:
      # The skill teaches that LatLonPointSpatialField -> geo_point
      - type: contains
        value: "geo_point"
        metric: spatial_mapping
      # The skill teaches that copyField -> copy_to
      - type: contains
        value: "copy_to"
        metric: copyfield_mapping
      # The skill teaches that TrieIntField is deprecated, maps to integer
      - type: icontains
        value: "integer"
        metric: trie_mapping
      # The skill should flag incompatibilities or behavioral differences
      - type: javascript
        value: >
          output.toLowerCase().includes('incompatib') ||
          output.toLowerCase().includes('deprecat') ||
          output.toLowerCase().includes('behavioral') ||
          output.toLowerCase().includes('breaking')
        metric: flags_issues

