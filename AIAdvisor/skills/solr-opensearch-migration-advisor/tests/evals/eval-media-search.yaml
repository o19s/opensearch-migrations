description: "TMDB media search: Solr eDisMax -> OpenSearch query translation evals"

# Prerequisites:
#   cd AIAdvisor/skills/solr-opensearch-migration-advisor
#   uv sync --extra eval
#   source .venv/bin/activate
#   cp .env.example .env   # fill in CLAUDE_CODE_OAUTH_TOKEN
#   See tests/evals/README.md for details on Claude auth and Bedrock setup.
#
# IMPORTANT: promptfoo uses its own python subprocess, NOT your activated venv.
#   export PROMPTFOO_PYTHON=$(pwd)/.venv/bin/python
#   Without this, you'll get "No module named 'claude_agent_sdk'".
#
# Running tests:
#   Test descriptions are prefixed by category (qf-, pf-, hl-, bf-, bq-,
#   mm-, fq-, sort-, facet-, combo-, judge-). Use --filter-pattern to
#   select subsets.
#
#   # Deterministic only (fast, no LLM judge needed):
#   promptfoo eval -c eval-media-search.yaml --filter-pattern "^(?!judge)"
#
#   # LLM-as-judge only (requires JUDGE_PROVIDER or Bedrock):
#   promptfoo eval -c eval-media-search.yaml --filter-pattern "^judge"
#
#   # Single category:
#   promptfoo eval -c eval-media-search.yaml --filter-pattern "^hl-"
#
#   # Everything:
#   promptfoo eval -c eval-media-search.yaml
#
#   # View results in browser:
#   promptfoo view
#
#   # Export shareable HTML report:
#   promptfoo eval -c eval-media-search.yaml --output results.html
#
# ┌─────────────────────────────────────────────────────────────────┐
# │  LLM-as-judge provider (only needed for tier=llm-judge tests)  │
# │                                                                │
# │  LOCAL (free):  export JUDGE_PROVIDER=ollama:MODEL_NAME        │
# │  REMOTE ($$):   Bedrock Claude Sonnet (default if unset)       │
# │                                                                │
# │  Examples:                                                     │
# │    export JUDGE_PROVIDER=ollama:qwen3:14b     # local, free    │
# │    export JUDGE_PROVIDER=ollama:llama3:8b     # local, free    │
# │    export JUDGE_PROVIDER=openai:gpt-4o        # remote, $$     │
# │    unset JUDGE_PROVIDER  # back to Bedrock default             │
# └─────────────────────────────────────────────────────────────────┘

providers:
  - id: 'file://claude_requests.py'
    label: 'Claude agent invocation'
    config:
      timeout: 3000000

defaultTest:
  metadata:
    continue: false
  vars:
    tmdb_schema: "file://fixtures/tmdb-solr-schema.xml"
  options:
    provider:
      id: '{{env.JUDGE_PROVIDER | default("bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0")}}'
      config:
        region: us-east-1
        max_tokens: 256

prompts:
  - id: tmdb-query-translation
    label: "TMDB Solr-to-OpenSearch query translation"
    raw: "{{query}}"

tests:

  # ═══════════════════════════════════════════════════════════════
  #  FIELD WEIGHTING (qf) — 5 tests
  # ═══════════════════════════════════════════════════════════════

  - description: "qf-01: basic field weighting -> multi_match with boosts"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=dark knight
        qf=title^10 overview^5 cast^3 directors^3 tagline^2

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "multi_match"
      - type: icontains
        value: "title^10"
      - type: icontains
        value: "overview^5"
      - type: contains-any
        value:
          - "best_fields"
          - "cross_fields"
          - "combined_fields"

  - description: "qf-02: single field query -> match on one field"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=inception
        qf=title

        Provide only the OpenSearch query JSON.
    assert:
      - type: contains-any
        value:
          - "match"
          - "multi_match"
      - type: icontains
        value: "title"
      - type: icontains
        value: "inception"

  - description: "qf-03: equal-weight fields -> no explicit boosts needed"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=comedy
        qf=title overview tagline

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "multi_match"
      - type: icontains
        value: "title"
      - type: icontains
        value: "overview"
      - type: icontains
        value: "tagline"

  - description: "qf-04: many fields with varied boosts"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=war drama
        qf=title^10 overview^5 tagline^4 cast^3 directors^3 genres^2

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "multi_match"
      - type: icontains
        value: "title^10"
      - type: icontains
        value: "genres^2"
      - type: javascript
        value: |
          const fields = ['title', 'overview', 'tagline', 'cast', 'directors', 'genres'];
          const missing = fields.filter(f => !output.toLowerCase().includes(f));
          return missing.length === 0 ? { pass: true, score: 1 }
            : { pass: false, score: 0, reason: `Missing fields: ${missing.join(', ')}` };

  - description: "qf-05: combined_fields hint for same-analyzer fields"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL.
        All three fields use text_general, so prefer combined_fields if appropriate:
        defType=edismax
        q=space adventure
        qf=title overview tagline

        Provide only the OpenSearch query JSON.
    assert:
      - type: contains-any
        value:
          - "combined_fields"
          - "cross_fields"
          - "multi_match"
      - type: icontains
        value: "title"
      - type: icontains
        value: "overview"

  # ═══════════════════════════════════════════════════════════════
  #  PHRASE BOOSTING (pf) — 3 tests
  # ═══════════════════════════════════════════════════════════════

  - description: "pf-01: phrase fields -> bool.should with type:phrase"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=the dark knight rises
        qf=title^10 overview^5
        pf=title^15 overview^8

        Show both the keyword query and the phrase boost. Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "multi_match"
      - type: icontains
        value: "phrase"
      - type: icontains
        value: "title^15"
      - type: icontains
        value: "overview^8"
      - type: icontains
        value: "should"
      - type: icontains
        value: "bool"

  - description: "pf-02: pf2 bigram phrase with slop"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=star wars adventure
        qf=title^10 overview^5
        pf2=title^5 overview^3
        ps2=2

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "phrase"
      - type: icontains
        value: "slop"
      - type: icontains
        value: "should"

  - description: "pf-03: qf + pf together (both must appear)"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=romantic comedy
        qf=title^10 overview^5 tagline^2
        pf=title^12 overview^6

        Both the keyword match and phrase boost must be present. Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "bool"
      - type: icontains
        value: "must"
      - type: icontains
        value: "should"
      - type: icontains
        value: "phrase"
      - type: icontains
        value: "title^10"
      - type: icontains
        value: "title^12"

  # ═══════════════════════════════════════════════════════════════
  #  HIGHLIGHTING (hl.*) — 5 tests
  # ═══════════════════════════════════════════════════════════════

  - description: "hl-01: basic highlighting params -> OpenSearch highlight section"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr highlighting configuration to OpenSearch query JSON:
        q=inception
        hl=true
        hl.fl=title,overview
        hl.fragsize=150
        hl.snippets=3
        hl.simple.pre=<em>
        hl.simple.post=</em>

        Provide only the OpenSearch query JSON with the highlight section.
    assert:
      - type: icontains
        value: "highlight"
      - type: icontains
        value: "fragment_size"
      - type: icontains
        value: "number_of_fragments"
      - type: icontains
        value: "pre_tags"
      - type: icontains
        value: "post_tags"
      - type: javascript
        value: |
          const has150 = output.includes('150');
          const has3 = /number_of_fragments["\s:]+3/.test(output);
          if (!has150) return false;
          if (!has3) return false;
          return true;

  - description: "hl-02: termVectors field -> FVH or term_vector mapping note"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        The title field has termVectors="true", termPositions="true", termOffsets="true".
        Translate the highlighting for title to OpenSearch, noting which highlighter
        type is appropriate and any mapping requirements.

        Provide only the OpenSearch query JSON and any mapping notes.
    assert:
      - type: icontains
        value: "highlight"
      - type: contains-any
        value:
          - "fvh"
          - "fast vector"
          - "term_vector"
          - "with_positions_offsets"
      - type: icontains
        value: "title"

  - description: "hl-03: no termVectors -> unified or plain highlighter"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        The overview field does NOT have termVectors. Translate highlighting
        for overview to OpenSearch, recommending the appropriate highlighter type.

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "highlight"
      - type: contains-any
        value:
          - "unified"
          - "plain"
      - type: icontains
        value: "overview"

  - description: "hl-04: requireFieldMatch -> require_field_match"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr highlighting configuration to OpenSearch:
        hl=true
        hl.fl=title,overview
        hl.requireFieldMatch=true

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "highlight"
      - type: icontains
        value: "require_field_match"

  - description: "hl-05: custom pre/post tags (strong)"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr highlighting configuration to OpenSearch:
        hl=true
        hl.fl=title,overview
        hl.simple.pre=<strong class="hit">
        hl.simple.post=</strong>

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "pre_tags"
      - type: icontains
        value: "post_tags"
      - type: icontains
        value: "strong"

  # ═══════════════════════════════════════════════════════════════
  #  BOOST FUNCTIONS (bf) — 2 tests
  # ═══════════════════════════════════════════════════════════════

  - description: "bf-01: vote_average boost -> function_score"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=action hero
        qf=title^10 overview^5
        bf=vote_average^2

        Provide only the OpenSearch query JSON.
    assert:
      - type: contains-any
        value:
          - "function_score"
          - "field_value_factor"
          - "script_score"
      - type: icontains
        value: "vote_average"

  - description: "bf-02: recency boost on release_date -> decay function"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=thriller
        qf=title^10 overview^5
        bf=recip(ms(NOW,release_date),3.16e-11,1,1)

        Provide only the OpenSearch query JSON.
    assert:
      - type: contains-any
        value:
          - "function_score"
          - "decay"
          - "gauss"
          - "exp"
          - "linear"
          - "script_score"
      - type: icontains
        value: "release_date"

  # ═══════════════════════════════════════════════════════════════
  #  BOOST QUERIES (bq) — 2 tests
  # ═══════════════════════════════════════════════════════════════

  - description: "bq-01: genre boost query -> should clause"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=hero
        qf=title^10 overview^5
        bq=genres:Action^5

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "should"
      - type: icontains
        value: "genres"
      - type: icontains
        value: "Action"

  - description: "bq-02: multiple boost queries -> multiple should clauses"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=adventure
        qf=title^10 overview^5
        bq=genres:Action^5
        bq=genres:Adventure^3

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "should"
      - type: icontains
        value: "Action"
      - type: icontains
        value: "Adventure"

  # ═══════════════════════════════════════════════════════════════
  #  MINIMUM MATCH (mm) — 2 tests
  # ═══════════════════════════════════════════════════════════════

  - description: "mm-01: simple percentage -> minimum_should_match"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=romantic comedy adventure
        qf=title^10 overview^5
        mm=75%

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "minimum_should_match"
      - type: icontains
        value: "75%"

  - description: "mm-02: complex mm expression -> minimum_should_match"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=star wars space adventure movie
        qf=title^10 overview^5
        mm=2<-1 5<80%

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "minimum_should_match"
      - type: contains-any
        value:
          - "2<-1 5<80%"
          - "2<-1"
          - "80%"

  # ═══════════════════════════════════════════════════════════════
  #  FILTER QUERIES (fq) — 3 tests
  # ═══════════════════════════════════════════════════════════════

  - description: "fq-01: single term filter -> bool.filter"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=hero
        qf=title^10 overview^5
        fq=genres:Action

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "filter"
      - type: icontains
        value: "bool"
      - type: icontains
        value: "genres"
      - type: icontains
        value: "Action"

  - description: "fq-02: multiple filter queries -> multiple filter clauses"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=adventure
        qf=title^10 overview^5
        fq=genres:Animation
        fq=release_date:[2015-01-01T00:00:00Z TO 2025-01-01T00:00:00Z]

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "filter"
      - type: icontains
        value: "genres"
      - type: icontains
        value: "Animation"
      - type: contains-any
        value:
          - "range"
          - "gte"
          - "lte"
      - type: icontains
        value: "release_date"

  - description: "fq-03: range filter -> range query in filter"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=thriller
        qf=title^10 overview^5
        fq=vote_count:[10 TO *]

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "filter"
      - type: icontains
        value: "range"
      - type: icontains
        value: "vote_count"
      - type: contains-any
        value:
          - "gte"
          - "gt"
          - "10"

  # ═══════════════════════════════════════════════════════════════
  #  SORT — 2 tests
  # ═══════════════════════════════════════════════════════════════

  - description: "sort-01: field sort desc"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr query to OpenSearch DSL:
        q=*:*
        sort=vote_average desc
        rows=10

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "sort"
      - type: icontains
        value: "vote_average"
      - type: icontains
        value: "desc"

  - description: "sort-02: score then field sort"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=action
        qf=title^10 overview^5
        sort=score desc, vote_average desc

        Provide only the OpenSearch query JSON.
    assert:
      - type: icontains
        value: "sort"
      - type: contains-any
        value:
          - "_score"
          - "score"
      - type: icontains
        value: "vote_average"

  # ═══════════════════════════════════════════════════════════════
  #  FACETING -> AGGREGATIONS — 2 tests
  # ═══════════════════════════════════════════════════════════════

  - description: "facet-01: field facet -> terms aggregation"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr query with faceting to OpenSearch DSL:
        q=*:*
        facet=true
        facet.field=genres_s
        facet.limit=10

        Provide only the OpenSearch query JSON including aggregations.
    assert:
      - type: icontains
        value: "aggs"
      - type: icontains
        value: "terms"
      - type: icontains
        value: "genres"

  - description: "facet-02: range facet -> histogram or range aggregation"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this Solr query with faceting to OpenSearch DSL:
        q=*:*
        facet=true
        facet.range=vote_average
        facet.range.start=0
        facet.range.end=10
        facet.range.gap=1

        Provide only the OpenSearch query JSON including aggregations.
    assert:
      - type: icontains
        value: "aggs"
      - type: icontains
        value: "vote_average"
      - type: contains-any
        value:
          - "histogram"
          - "range"

  # ═══════════════════════════════════════════════════════════════
  #  COMBINED / COMPLEX — 2 tests
  # ═══════════════════════════════════════════════════════════════

  - description: "combo-01: qf + fq + hl + sort (deterministic)"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this full Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=space adventure
        qf=title^10 overview^5 cast^3
        fq=genres:Science Fiction
        sort=score desc, vote_average desc
        hl=true
        hl.fl=title,overview
        hl.fragsize=200
        hl.snippets=2
        hl.simple.pre=<em>
        hl.simple.post=</em>

        Provide only the complete OpenSearch query JSON.
    assert:
      - type: icontains
        value: "multi_match"
      - type: icontains
        value: "filter"
      - type: icontains
        value: "highlight"
      - type: icontains
        value: "sort"
      - type: icontains
        value: "fragment_size"
      - type: icontains
        value: "pre_tags"

  - description: "combo-02: full eDisMax with qf + pf + bf + bq + fq + mm + hl"
    vars:
      query: |
        I'm migrating a TMDB movie search from Solr 8.11 to OpenSearch.
        Here is the Solr schema:
        {{tmdb_schema}}

        Translate this complete Solr eDisMax query to OpenSearch DSL:
        defType=edismax
        q=action hero
        qf=title^10 overview^5 cast^3 directors^3 tagline^2
        pf=title^15 overview^8
        bf=vote_average^2
        bq=genres:Action^5
        mm=75%
        fq=vote_count:[10 TO *]
        sort=score desc
        hl=true
        hl.fl=title,overview,tagline
        hl.fragsize=150
        hl.snippets=3
        hl.simple.pre=<em>
        hl.simple.post=</em>

        Provide only the complete OpenSearch query JSON.
    assert:
      - type: icontains
        value: "bool"
      - type: icontains
        value: "multi_match"
      - type: icontains
        value: "phrase"
      - type: icontains
        value: "should"
      - type: icontains
        value: "filter"
      - type: contains-any
        value:
          - "function_score"
          - "field_value_factor"
          - "script_score"
      - type: icontains
        value: "minimum_should_match"
      - type: icontains
        value: "highlight"
      - type: icontains
        value: "sort"

  # ═══════════════════════════════════════════════════════════════
  #  LLM-AS-JUDGE (opt-in) — 2 tests
  #  Run with: --filter-pattern "^judge"
  # ═══════════════════════════════════════════════════════════════

  - description: "judge-01: full migration plan quality — holistic review"
    vars:
      query: |
        I'm a Search Relevance Engineer migrating our TMDB movie search
        from Solr 8.11 to OpenSearch.

        Here is the Solr schema:
        {{tmdb_schema}}

        Here is our full eDisMax configuration:
        defType=edismax
        q={user_query}
        qf=title^10 overview^5 cast^3 directors^3 tagline^2
        pf=title^15 overview^8
        bf=vote_average^2
        bq=genres:Action^5
        mm=2<-1 5<80%
        fq=vote_count:[10 TO *]
        sort=score desc, vote_average desc
        hl=true
        hl.fl=title,overview,tagline
        hl.fragsize=150
        hl.snippets=3
        hl.simple.pre=<em>
        hl.simple.post=</em>
        facet=true
        facet.field=genres_s
        facet.field=directors

        Produce a complete OpenSearch migration covering:
        1. Index mapping
        2. Query DSL
        3. Highlighting
        4. Aggregations
        5. Any incompatibilities or warnings
    assert:
      - type: llm-rubric
        value: >-
          Response produces a structurally complete migration covering all five
          requested areas. The query DSL correctly translates qf to multi_match
          boosts, pf to phrase boost, bf to function_score, bq to should clause,
          mm to minimum_should_match, fq to bool.filter, and sort to OpenSearch
          sort syntax. Highlighting maps all hl.* params. Facets become aggs.
        metric: full-migration-quality

  - description: "judge-02: highlighting and field weighting migration guidance"
    vars:
      query: |
        I'm a Search Relevance Engineer. I need to migrate our TMDB movie search
        from Solr 8.11 to OpenSearch.

        Here is the Solr schema:
        {{tmdb_schema}}

        Our search is heavily reliant on highlighting for result snippets — users
        see title and overview highlights on every result. We also use eDisMax
        with field weighting across title, overview, cast, and directors to get
        the right "discovery" feel.

        Our eDisMax configuration:
        defType=edismax
        qf=title^10 overview^5 cast^3 directors^3 tagline^2
        pf=title^15 overview^8
        hl=true
        hl.fl=title,overview,tagline
        hl.fragsize=150
        hl.snippets=3
        hl.simple.pre=<em>
        hl.simple.post=</em>

        Please produce an OpenSearch migration plan covering the index mapping,
        query translation, and highlighting setup.
    assert:
      - type: llm-rubric
        value: >-
          Response discusses highlighter type choice (unified, plain, or fvh)
          and notes that the title field's termVectors enables FVH or requires
          term_vector in the OpenSearch mapping.
        metric: highlighter-type-choice
      - type: llm-rubric
        value: >-
          Response translates the eDisMax qf boosts into an OpenSearch multi_match
          or equivalent query with per-field boost values, and addresses the pf
          phrase fields as a separate phrase-type query.
        metric: field-weight-and-phrase
      - type: llm-rubric
        value: >-
          Response flags storage or performance implications of term vectors
          for highlighting as a consideration for the migration.
        metric: storage-callout
