description: "Blue-sky SMA evals: deeper translation, operational guidance, migration strategy"

# Prerequisites:
#   cd AIAdvisor/skills/solr-opensearch-migration-advisor
#   uv sync --extra eval
#   source .venv/bin/activate
#   cp .env.example .env   # fill in CLAUDE_CODE_OAUTH_TOKEN
#   export PROMPTFOO_PYTHON=$(pwd)/.venv/bin/python
#
# Running tests:
#   Test descriptions are prefixed by category. Use --filter-pattern to select subsets:
#
#   # Function query translation:
#   promptfoo eval -c eval-blue-sky.yaml --filter-pattern "^funcq-"
#
#   # Everything:
#   promptfoo eval -c eval-blue-sky.yaml
#
#   promptfoo view

providers:
  - id: 'file://claude_requests.py'
    label: 'Claude agent invocation'
    config:
      timeout: 3000000

defaultTest:
  metadata:
    continue: false
  vars:
    ecommerce_schema: "file://fixtures/ecommerce-schema.xml"
    ecommerce_solrconfig: "file://fixtures/ecommerce-solrconfig.xml"
    ecommerce_dih: "file://fixtures/ecommerce-dih-config.xml"
  options:
    provider:
      id: '{{env.JUDGE_PROVIDER | default("bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0")}}'
      config:
        region: us-east-1
        max_tokens: 512

prompts:
  - id: blue-sky-prompt
    label: "Blue-sky SMA eval"
    raw: "{{query}}"

tests:

  # ═══════════════════════════════════════════════════════════════
  #  FUNCTION QUERY TRANSLATION
  # ═══════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────
  #  Function Query Translation (funcq-*) — 4 tests
  #
  #  Why this matters: Solr bf expressions are a mini-language.
  #  Shallow "use function_score" advice doesn't help; the advisor
  #  must decompose the actual expression.
  # ─────────────────────────────────────────────────────────────

  - description: "funcq-01: recip date boost -> decay function with correct params"
    vars:
      query: |
        I'm migrating from Solr 8.11 to OpenSearch. Here is our schema:
        {{ecommerce_schema}}

        Our /search handler (from solrconfig.xml) uses this recency boost:
        bf=recip(ms(NOW,updated_at),3.16e-11,1,1)^0.5

        Explain how the recip() parameters map to the OpenSearch decay function
        parameters (scale, offset, decay). Provide the complete OpenSearch query JSON.
    assert:
      - type: icontains
        value: "function_score"
      - type: contains-any
        value:
          - "gauss"
          - "exp"
          - "linear"
          - "decay"
      - type: icontains
        value: "updated_at"
      - type: contains-any
        value:
          - "scale"
          - "offset"
          - "origin"
      - type: llm-rubric
        value: >-
          The response must provide a complete, correct OpenSearch function_score query
          that translates recip(ms(NOW,updated_at),3.16e-11,1,1)^0.5. Verify:
          1. Uses a decay function (gauss, exp, or linear) on the updated_at field —
             NOT a raw script_score reimplementing the recip formula.
          2. Sets origin to "now" (or current date).
          3. Provides a scale value that reflects the 3.16e-11 constant (roughly 1 year
             in milliseconds — the half-life of the recip curve). The scale should be
             in a time unit like "365d" or "1y" or similar order of magnitude.
          4. The ^0.5 boost is translated as a weight on the function (e.g. "weight": 0.5)
             or equivalent boost_mode adjustment.
          A response that just says "use gauss decay" without showing the actual JSON
          with concrete parameter values is NOT sufficient.
        metric: funcq-01-param-correctness

  - description: "funcq-02: field value factor with log modifier"
    vars:
      query: |
        I'm migrating from Solr 8.11 to OpenSearch. Here is our schema:
        {{ecommerce_schema}}

        We boost popular products using:
        bf=log(review_count)^0.5

        Provide the OpenSearch function_score equivalent. Note how the log()
        wrapping and the ^0.5 boost translate.
    assert:
      - type: icontains
        value: "function_score"
      - type: contains-any
        value:
          - "field_value_factor"
          - "script_score"
      - type: icontains
        value: "review_count"
      - type: contains-any
        value:
          - "log"
          - "ln"
          - "modifier"
      - type: llm-rubric
        value: >-
          The response must provide a complete OpenSearch function_score query that
          correctly translates bf=log(review_count)^0.5. Verify:
          1. Uses field_value_factor with field "review_count" and a log-family modifier
             (log, log1p, log2p, ln, ln1p, or ln2p) — OR a script_score with an
             explicit Math.log10/Math.log call on the review_count field.
          2. The ^0.5 boost is translated as a weight (e.g. "weight": 0.5) on the
             function entry, NOT as a global boost on the entire query.
          3. Handles the missing/zero-value case (e.g. "missing": 1 for field_value_factor,
             or a guard in the script to avoid log(0)).
          4. Shows complete, valid JSON — not pseudocode or partial snippets.
          A response that just says "use field_value_factor with log modifier" without
          concrete JSON is NOT sufficient.
        metric: funcq-02-field-value-correctness

  - description: "funcq-03: geodist boost -> distance decay"
    vars:
      query: |
        I'm migrating from Solr 8.11 to OpenSearch. Here is our schema:
        {{ecommerce_schema}}

        Our /stores handler uses geodist boosting to rank nearby results higher:
        defType=edismax
        q=laptop
        qf=product_name^10 description^5
        bf=recip(geodist(),1,100,100)
        sfield=store_location
        pt=40.7128,-74.0060

        The store_location field is a LatLonPointSpatialField.
        Provide the OpenSearch query JSON with the equivalent geo-distance decay.
    assert:
      - type: icontains
        value: "function_score"
      - type: contains-any
        value:
          - "gauss"
          - "exp"
          - "linear"
          - "decay"
      - type: contains-any
        value:
          - "geo_point"
          - "store_location"
          - "location"
      - type: contains-any
        value:
          - "40.7128"
          - "-74.006"
          - "origin"
      - type: llm-rubric
        value: >-
          The response must provide a complete OpenSearch function_score query that
          correctly translates the geodist-based boost. Verify:
          1. Uses a geo decay function (gauss, exp, or linear) — NOT a script_score
             with manual Haversine calculation.
          2. The decay function targets the store_location field (or equivalent geo_point field).
          3. The origin is set to the coordinates 40.7128, -74.0060 (the pt parameter).
          4. Provides a scale parameter (e.g. "100km" or similar) that reflects the
             recip(geodist(),1,100,100) shape — where 100 is the half-distance in the
             recip denominator.
          5. The main query (multi_match on product_name^10 description^5 for "laptop")
             is preserved as the inner query of the function_score wrapper.
          A response that only shows the decay function without the wrapping
          function_score + multi_match structure is NOT sufficient.
        metric: funcq-03-geodist-correctness

  - description: "funcq-04: multiple bf + bq combined -> function_score with multiple functions"
    vars:
      query: |
        I'm migrating from Solr 8.11 to OpenSearch. Here is our schema:
        {{ecommerce_schema}}

        Here is our full /search handler config:
        {{ecommerce_solrconfig}}

        The /search handler combines recency boost, popularity boost, and
        in-stock boosting:
        bf=recip(ms(NOW,updated_at),3.16e-11,1,1)^0.5
        bf=log(review_count)^0.3
        bq=in_stock:true^10
        bq=avg_rating:[4 TO *]^3

        Provide the complete OpenSearch query JSON that combines all boost
        signals. Note how multiple bf values and multiple bq values translate.
    assert:
      - type: icontains
        value: "function_score"
      - type: icontains
        value: "should"
      - type: icontains
        value: "updated_at"
      - type: icontains
        value: "review_count"
      - type: icontains
        value: "in_stock"
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          const hasMultipleFunctions = (lower.includes('functions') || lower.includes('script'))
            && lower.includes('updated_at') && lower.includes('review_count');
          const hasBothBq = lower.includes('in_stock') && (lower.includes('avg_rating') || lower.includes('4'));
          return (hasMultipleFunctions && hasBothBq)
            ? { pass: true, score: 1 }
            : { pass: false, score: 0, reason: 'Must translate both bf expressions as function_score functions AND both bq expressions as should clauses' };
