description: "Guidance impact: prove steering + reference content changes skill output"

# This eval proves that curated steering and reference documents make
# the skill produce expert-level output. Two self-contained skill
# fixtures run side-by-side:
#
#   fixtures/skill-bare/     SKILL.md only, empty steering/, no references
#   fixtures/skill-guided/   SKILL.md + steering triggers + reference deep-dives
#
# Each steering trigger in incompatibilities.md maps to a reference doc.
# Each test maps to a specific steering trigger.
# The report shows exactly what content was added to flip red → green.
#
# Expected result:
#   bare (no steering)     → all RED  (skill lacks expert knowledge)
#   guided (with steering) → all GREEN (steering + references provide it)
#
# Prerequisites:
#   cd AIAdvisor/skills/solr-opensearch-migration-advisor
#   uv sync --extra eval
#   source .venv/bin/activate
#   cp .env.example .env   # fill in CLAUDE_CODE_OAUTH_TOKEN
#   export PROMPTFOO_PYTHON=$(pwd)/.venv/bin/python
#
# Running:
#   cd tests/evals
#   promptfoo eval -c eval-guidance-impact.yaml
#   promptfoo view   # side-by-side: bare (red) vs guided (green)
#
# Fixture structure:
#   skill-bare/
#     SKILL.md                          ← minimal skill definition
#     steering/README.md                ← empty, no guidance
#
#   skill-guided/
#     SKILL.md                          ← same skill + "read steering/" instruction
#     steering/incompatibilities.md     ← 5 triggers, one per test
#     references/function-queries.md   ← deep-dive for test 1
#     references/request-handlers.md   ← deep-dive for test 2
#     references/edismax.md            ← deep-dive for test 3
#     references/highlighting.md       ← deep-dive for test 4
#     references/joins.md             ← deep-dive for test 5

providers:
  # Bare: minimal SKILL.md, no steering, no references
  - id: 'file://claude_requests.py'
    label: 'bare (no steering)'
    config:
      cwd: fixtures/skill-bare
      timeout: 3000000

  # Guided: SKILL.md + steering triggers + reference deep-dives
  - id: 'file://claude_requests.py'
    label: 'guided (with steering)'
    config:
      cwd: fixtures/skill-guided
      timeout: 3000000

defaultTest:
  metadata:
    continue: false

prompts:
  - id: guidance-impact-scenario
    label: "Migration scenario"
    raw: "{{query}}"

tests:

  # Each test maps to one steering trigger + one reference doc.
  # The steering trigger and reference file are noted in the description
  # so the report traces exactly what content flips the test green.

  - description: "function queries → script_score (steering: incompatibilities.md#function-queries, ref: function-queries.md)"
    vars:
      query: |
        I'm migrating a Solr 8 application to OpenSearch. We heavily use
        Solr function queries for custom scoring, including bf=recip(ms(NOW,release_date),3.16e-11,1,1)
        and bf=log(popularity). What are the OpenSearch equivalents?
        Be specific about the query DSL constructs to use.
    assert:
      - type: contains-any
        value:
          - "script_score"
          - "function_score"
          - "field_value_factor"
        metric: function-query-translation

  - description: "request handlers → no direct equivalent (steering: incompatibilities.md#handlers, ref: request-handlers.md)"
    vars:
      query: |
        Our Solr 8 setup has custom request handlers that combine search
        with business logic (inventory checks, personalization). We need
        to migrate these to OpenSearch. What's the equivalent?
    assert:
      - type: contains-any
        value:
          - "no direct equivalent"
          - "not directly equivalent"
          - "no equivalent"
          - "must rebuild"
          - "must be rebuilt"
          - "rebuild using"
          - "need to be rewritten"
          - "needs to be rewritten"
        metric: handler-incompatibility

  - description: "eDisMax qf → multi_match (steering: incompatibilities.md#edismax, ref: edismax.md)"
    vars:
      query: |
        I need to translate this Solr eDisMax query to OpenSearch:
        defType=edismax
        q=dark knight
        qf=title^10 overview^5 cast^3 directors^3

        What is the exact OpenSearch query DSL?
    assert:
      - type: icontains
        value: "multi_match"
        metric: edismax-multi-match
      - type: icontains
        value: "title^10"
        metric: edismax-boost-preserved

  - description: "highlighting hl.* → fragment_size (steering: incompatibilities.md#highlighting, ref: highlighting.md)"
    vars:
      query: |
        Translate this Solr highlighting config to OpenSearch query DSL:
        hl=true
        hl.fl=title,overview
        hl.fragsize=150
        hl.snippets=3
        hl.simple.pre=<em>
        hl.simple.post=</em>

        Provide the exact OpenSearch JSON.
    assert:
      - type: icontains
        value: "fragment_size"
        metric: highlight-fragsize
      - type: icontains
        value: "number_of_fragments"
        metric: highlight-num-fragments
      - type: icontains
        value: "pre_tags"
        metric: highlight-tags

  - description: "joins → terms lookup / denormalize (steering: incompatibilities.md#joins, ref: joins.md)"
    vars:
      query: |
        Our Solr app uses join queries between collections:
        {!join from=author_id to=id fromIndex=authors}name:Shakespeare

        How do we handle this in OpenSearch? Be specific about the approach.
    assert:
      - type: contains-any
        value:
          - "terms lookup"
          - "terms query"
          - "flattened"
          - "denormalize"
          - "denormalized"
          - "application-side"
          - "application side"
        metric: join-replacement
