description: "Guidance impact: prove steering content changes LLM output"

# This eval demonstrates that our steering documents are not decorative —
# they measurably change what the model produces. The same scenario is
# sent via two prompts: bare (just the question) and guided (steering
# prepended). Deterministic assertions check for specific expert terms.
#
# Prerequisites:
#   Ollama running locally with a small model (default: llama3.2:latest)
#   ollama pull llama3.2
#
# Running:
#   cd AIAdvisor/skills/solr-opensearch-migration-advisor/tests/evals
#
#   # All guidance impact tests:
#   promptfoo eval -c eval-guidance-impact.yaml
#
#   # View results side-by-side (bare vs guided columns):
#   promptfoo view
#
#   # Export shareable report:
#   promptfoo eval -c eval-guidance-impact.yaml --output guidance-impact.html
#
# To use a different model:
#   OLLAMA_MODEL=qwen3:14b promptfoo eval -c eval-guidance-impact.yaml

providers:
  - id: 'ollama:chat:{{env.OLLAMA_MODEL | default("llama3.2:latest")}}'
    label: 'ollama'
    config:
      temperature: 0.3

defaultTest:
  metadata:
    continue: false
  vars:
    scenario: &scenario |
      A client is migrating from Solr to OpenSearch. They have function
      queries for custom scoring, filter queries (fq) for faceted navigation,
      custom request handlers with business logic, Solr join queries between
      collections, and nested child documents. They say: 'It's all Lucene
      underneath, so most of it ports directly.' Respond as a migration
      consultant in 2-3 paragraphs.

prompts:
  # Two prompts: bare gets just the scenario, guided gets steering prepended
  - id: bare-prompt
    label: "bare (no steering)"
    raw: "{{scenario}}"

  - id: guided-prompt
    label: "guided (with steering)"
    raw: |
      Follow the guidance below strictly when answering.

      --- STEERING: accuracy.md ---
      Accuracy is the top priority. When translating Solr constructs to
      OpenSearch equivalents, never guess or approximate. Flag any Solr feature
      that has no direct OpenSearch equivalent rather than silently substituting
      a close-but-different alternative.

      --- STEERING: incompatibilities.md ---
      ## Query Gaps
      ### Function Queries
      Solr function queries (bf, boost, _val_) use a math-expression syntax
      that has no direct equivalent in OpenSearch. The replacement is
      function_score with script_score, field_value_factor, or decay functions.
      Common patterns:
      - bf=vote_average^2 → function_score with field_value_factor
      - bf=recip(ms(NOW,release_date),3.16e-11,1,1) → function_score with exp/gauss decay
      - bf=log(vote_count) → field_value_factor with modifier: log1p
      - Arbitrary math → script_score with Painless scripting
      Key: boost_mode matters (bf is additive, boost is multiplicative).
      script_score runs Painless on every matching doc — slower than field_value_factor.

      ### MoreLikeThis (MLT)
      Solr MLT maps to OpenSearch more_like_this query. Parameter names differ.

      ### Spatial
      Solr latlon/spatial fields map to geo_point/geo_shape. Query syntax differs.

      ## Features
      - Dynamic Fields: Solr dynamicField → OpenSearch dynamic_templates.
      - Nested Docs: Solr _childDocuments_ maps to nested objects or parent-child joining.
      - Joins: Solr {!join} maps to terms lookup query or flattened index design.
        No direct equivalent for chained joins.

      ## Plugins
      - Custom Request Handlers: No direct equivalent; must rebuild using
        standard Search API + client-side logic.
      - Search Components: No equivalent; logic must be moved to client or
        custom OpenSearch plugin.
      - Querqy: Community plugin for self-managed OS, NOT on AWS OpenSearch Service.
      - LTR: Both support LTR, but model formats and feature definitions differ.

      --- STEERING: query_translation.md ---
      Key Conversions:
      - q → query
      - qf → multi_match with fields and type: best_fields
      - pf → multi_match with type: phrase
      - mm → minimum_should_match
      - boost → boost or function_score
      - fq → filter in bool query

      --- END STEERING ---

      {{scenario}}

tests:

  # ═══════════════════════════════════════════════════════════════
  #  INCOMPATIBILITIES SCENARIO
  #
  #  4 concepts the steering should cause the model to produce:
  #    script_score      — from Function Queries section
  #    rebuild_handlers  — "no direct equivalent" for request handlers
  #    nested_mapping    — "nested" for child documents
  #    join_replacement  — "terms lookup" or "flattened" for joins
  #
  #  The "bare" prompt column should MISS at least one of these.
  #  The "guided" prompt column should HIT all or most of them.
  #  View results with: promptfoo view
  # ═══════════════════════════════════════════════════════════════

  - description: "bare: model misses expert terms without steering"
    assert:
      # Passes if ANY of these terms is absent from the bare response
      - type: not-contains-all
        value:
          - "script_score"
          - "no direct equivalent"
          - "nested"
          - "terms lookup"
        metric: bare-misses-terms

  - description: "guided: script_score for function queries"
    assert:
      - type: contains-any
        value:
          - "script_score"
          - "function_score"
          - "field_value_factor"
        metric: script-score-present

  - description: "guided: handlers flagged as no direct equivalent"
    assert:
      - type: contains-any
        value:
          - "no direct equivalent"
          - "not directly equivalent"
          - "no equivalent"
          - "must rebuild"
          - "must be rebuilt"
          - "rebuild using"
          - "need to be rewritten"
          - "needs to be rewritten"
          - "require significant rework"
        metric: rebuild-handlers-present

  - description: "guided: nested for child documents"
    assert:
      - type: icontains
        value: "nested"
        metric: nested-mapping-present

  - description: "guided: terms lookup or flattened for joins"
    assert:
      - type: contains-any
        value:
          - "terms lookup"
          - "terms query"
          - "flattened"
          - "denormalize"
          - "denormalized"
        metric: join-replacement-present
