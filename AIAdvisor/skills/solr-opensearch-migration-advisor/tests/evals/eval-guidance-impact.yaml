description: "Guidance impact: prove steering + reference content changes skill output"

# 5 tests designed to FAIL without steering and PASS with steering.
# Each tests domain knowledge that Claude/LLMs don't reliably have:
#
#   1. bf vs boost (additive vs multiplicative) — opinionated/counterintuitive
#   2. Querqy on AWS OpenSearch — genuinely niche, LLMs get this wrong
#   3. multi_match type selection — subtle, LLMs recommend wrong type
#   4. copyField → multi-fields not copy_to — TMDB-specific
#   5. SMUI export format — Querqy/SMUI niche, LLMs fabricate
#
# Fixture structure:
#   skill-bare/     → SKILL.md only, empty steering
#   skill-guided/   → SKILL.md + 5 steering triggers + 5 reference deep-dives
#
# Expected: bare column = all red, guided column = all green
#
# Running:
#   cd AIAdvisor/skills/solr-opensearch-migration-advisor/tests/evals
#   export PROMPTFOO_PYTHON=$(pwd)/../../.venv/bin/python
#   promptfoo eval -c eval-guidance-impact.yaml
#   promptfoo view

providers:
  - id: 'file://claude_requests.py'
    label: 'bare (no steering)'
    config:
      cwd: fixtures/skill-bare
      timeout: 3000000

  - id: 'file://claude_requests.py'
    label: 'guided (with steering)'
    config:
      cwd: fixtures/skill-guided
      timeout: 3000000

defaultTest:
  metadata:
    continue: false

prompts:
  - id: guidance-impact-scenario
    label: "Migration scenario"
    raw: "{{query}}"

tests:

  # ── Test 1: bf vs boost (opinionated) ──────────────────────────
  # Steering: incompatibilities.md#bf-vs-boost
  # Reference: bf-vs-boost.md
  # LLMs often conflate bf and boost or get the additive/multiplicative
  # distinction wrong. Steering must explicitly state bf=sum, boost=multiply.

  - description: "bf is additive (sum), boost is multiplicative (multiply)"
    vars:
      query: |
        In Solr eDisMax, explain the exact difference between the bf and
        boost parameters in terms of how they combine with the relevance
        score. For each one, what is the correct boost_mode value to use
        in an OpenSearch function_score query?

        Be specific: state whether each is additive or multiplicative,
        and give the exact boost_mode string for each.
    assert:
      - type: icontains
        value: "boost_mode"
        metric: mentions-boost-mode
      - type: javascript
        value: |
          // bf must be associated with "sum" and boost with "multiply"
          const lower = output.toLowerCase();
          const hasBfSum = /\bbf\b[\s\S]{0,200}(additive|sum)/i.test(output);
          const hasBoostMultiply = /\bboost\b[\s\S]{0,200}(multiplicative|multiply)/i.test(output);
          if (!hasBfSum) return false;
          if (!hasBoostMultiply) return false;
          return true;
        metric: bf-sum-boost-multiply

  # ── Test 2: Querqy on AWS (niche) ─────────────────────────────
  # Steering: incompatibilities.md#querqy-aws
  # Reference: querqy-to-native-os.md
  # LLMs often say Querqy can be installed on AWS OpenSearch — it cannot.

  - description: "Querqy is NOT available on AWS OpenSearch Service"
    vars:
      query: |
        We use Querqy in Solr for query rewriting. We're migrating to
        AWS OpenSearch Service (the managed service, not self-managed).
        Can we install the Querqy plugin on AWS OpenSearch Service?

        Answer yes or no, then explain what we should do instead for
        UP, DOWN, FILTER, and SYNONYM rules.
    assert:
      - type: javascript
        value: |
          // Must clearly say Querqy is NOT available/supported/installable on AWS
          const lower = output.toLowerCase();
          const saysNo = /cannot|can't|not available|not supported|not possible|does not support|doesn't support|no,/i.test(output);
          if (!saysNo) return false;
          return true;
        metric: querqy-aws-unavailable
      - type: contains-any
        value:
          - "boosting"
          - "negative_boost"
          - "bool"
          - "should"
        metric: querqy-down-replacement

  # ── Test 3: multi_match type for mixed analyzers (subtle) ──────
  # Steering: incompatibilities.md#edismax-type
  # Reference: multi-match-type-selection.md
  # LLMs often recommend combined_fields even when analyzers differ.

  - description: "Use best_fields (not combined_fields) when analyzers differ"
    vars:
      query: |
        I'm translating this Solr eDisMax to OpenSearch:
        qf=title^10 overview^5 genres_s^2

        title and overview use the text_general analyzer.
        genres_s is a string/keyword field (no analysis).

        Should I use multi_match type "best_fields" or "combined_fields"?
        Explain why one is correct and the other would fail.
    assert:
      - type: icontains
        value: "best_fields"
        metric: recommends-best-fields
      - type: javascript
        value: |
          // Must warn against combined_fields with mixed analyzers
          const lower = output.toLowerCase();
          const warnsCombined = /combined.fields[\s\S]{0,300}(same analyzer|require|error|fail|not work|won't work|incorrect|different analyz)/i.test(output)
            || /different analyz[\s\S]{0,200}(best_fields|not.*combined)/i.test(output);
          if (!warnsCombined) return false;
          return true;
        metric: warns-combined-fields

  # ── Test 4: copyField → multi-fields (TMDB-specific) ──────────
  # Steering: incompatibilities.md#copyfield
  # Reference: copyfield-to-multifield.md
  # LLMs suggest copy_to, but that doesn't re-analyze.

  - description: "copyField with different analyzer → multi-fields, not copy_to"
    vars:
      query: |
        In our TMDB Solr schema, we have these copyField rules:
        <copyField source="title" dest="title_en"/>
        <copyField source="title" dest="title_bidirect_syn"/>

        title_en uses an English analyzer (stemming).
        title_bidirect_syn uses a bidirectional synonym analyzer.

        How should we represent these in OpenSearch? Should we use
        copy_to or multi-fields? Explain why.
    assert:
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          // Must recommend multi-fields (fields: {}) not copy_to
          const recommendsMultiField = /multi.?field|"fields"|sub.?field|fields:\s*\{/i.test(output);
          const warnsCopyTo = /copy_to[\s\S]{0,200}(not|doesn't|does not|won't|raw|same analyz)/i.test(output)
            || /not.*copy_to/i.test(output);
          if (!recommendsMultiField) return false;
          return true;
        metric: uses-multi-fields

  # ── Test 5: SMUI export format (Querqy/SMUI niche) ────────────
  # Steering: incompatibilities.md#smui
  # Reference: smui-rule-translation.md
  # LLMs fabricate a JSON format. SMUI actually exports plain text.

  - description: "SMUI exports plain text rules, not JSON"
    vars:
      query: |
        I need to export rules from SMUI (Search Management UI for Querqy)
        and translate them to OpenSearch. What is the format of a SMUI
        rules export file? Is it JSON, XML, or something else?

        Show an example of what the export looks like for a term with
        SYNONYM and UP rules.
    assert:
      - type: javascript
        value: |
          const lower = output.toLowerCase();
          // Must say plain text, not JSON
          const saysPlainText = /plain.?text|text.?format|text.?file|not json|not.*xml|querqy.?format|rule.?block/i.test(output);
          const showsArrow = output.includes('=>');
          if (!saysPlainText && !showsArrow) return false;
          return true;
        metric: smui-plain-text-format
