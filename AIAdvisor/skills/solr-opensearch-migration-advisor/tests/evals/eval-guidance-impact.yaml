description: "Guidance impact: prove steering + reference content changes skill output"

# 4 tests designed to FAIL without steering and PASS with steering.
# Each tests domain knowledge that Claude doesn't reliably produce
# without curated steering and reference content.
#
# Fixture structure:
#   skill-bare/     → SKILL.md only, empty steering, no references
#   skill-guided/   → SKILL.md + steering triggers + reference deep-dives
#
# Expected: bare column = all red, guided column = all green
#
# Running:
#   cd AIAdvisor/skills/solr-opensearch-migration-advisor/tests/evals
#   export PROMPTFOO_PYTHON=$(pwd)/../../.venv/bin/python
#   promptfoo eval -c eval-guidance-impact.yaml
#   promptfoo view

providers:
  - id: 'file://claude_requests.py'
    label: 'bare (no steering)'
    config:
      cwd: fixtures/skill-bare
      timeout: 3000000

  - id: 'file://claude_requests.py'
    label: 'guided (with steering)'
    config:
      cwd: fixtures/skill-guided
      timeout: 3000000

defaultTest:
  metadata:
    continue: false

prompts:
  - id: guidance-impact-scenario
    label: "Migration scenario"
    raw: "{{query}}"

tests:

  # ── Confirmed stumper: copyField → multi-fields ────────────────
  # Steering: incompatibilities.md#copyfield
  # Reference: copyfield-to-multifield.md
  # Bare Claude says "use copy_to" — WRONG (copy_to doesn't re-analyze).
  # Guided Claude says "use multi-fields" — CORRECT.

  - description: "copyField with different analyzer → multi-fields, not copy_to"
    vars:
      query: |
        In our TMDB Solr schema, we have these copyField rules:
        <copyField source="title" dest="title_en"/>
        <copyField source="title" dest="title_bidirect_syn"/>

        title_en uses an English analyzer (stemming).
        title_bidirect_syn uses a bidirectional synonym analyzer.

        How should we represent these in OpenSearch? Should we use
        copy_to or multi-fields? Explain why.
    assert:
      - type: contains-any
        value:
          - "multi-field"
          - "multi_field"
          - "multifield"
          - "sub-field"
          - "\"fields\""
          - "fields:"
        metric: recommends-multi-fields

  # ── Querqy rewriter REST API format ────────────────────────────
  # Steering: incompatibilities.md#querqy-rewriter
  # Reference: querqy-rewriter-api.md
  # Claude won't know the exact PUT /_querqy/rewriter endpoint or the
  # JSON body structure with "class" and "config.rules" fields.

  - description: "Querqy rewriter registration via /_querqy/rewriter REST API"
    vars:
      query: |
        We're migrating our Querqy setup from Solr to the OpenSearch
        Querqy plugin. In Solr, we configured rewriters in querqy.xml.

        Show the exact REST API call to register a CommonRulesRewriter
        in the OpenSearch Querqy plugin. Include the HTTP method,
        endpoint path, and full JSON request body.
    assert:
      - type: contains-any
        value:
          - "_querqy/rewriter"
          - "_querqy"
        metric: querqy-endpoint
      - type: contains-any
        value:
          - "CommonRulesRewriter"
          - "commonrules"
          - "common_rules"
        metric: querqy-rewriter-class

  # ── Querqy infoLogging → OpenSearch equivalent ─────────────────
  # Steering: incompatibilities.md#querqy-info-logging
  # Reference: querqy-info-logging.md
  # Claude won't know the OpenSearch Querqy plugin uses "info_logging"
  # in the query body (not a request parameter) and returns
  # "querqy_decorations" in the response.

  - description: "Querqy infoLogging: debug which rules fired in OpenSearch"
    vars:
      query: |
        In Solr, we use querqy.infoLogging=on to see which Querqy rules
        fired for a given query. We're migrating to the OpenSearch Querqy
        plugin.

        How do we enable the same debug logging in OpenSearch? Show the
        exact query syntax and describe what the response looks like.
    assert:
      - type: contains-any
        value:
          - "info_logging"
          - "infoLogging"
          - "info logging"
        metric: info-logging-param
      - type: contains-any
        value:
          - "querqy_decorations"
          - "decorations"
          - "matched_queries"
        metric: decoration-response

  # ── positionIncrementGap parameter name and location ───────────
  # Steering: incompatibilities.md#position-increment-gap
  # Reference: position-increment-gap.md
  # Claude may know the concept but give the wrong parameter name
  # (camelCase instead of snake_case) or put it on the analyzer
  # instead of the field mapping.

  - description: "positionIncrementGap → position_increment_gap (snake_case, on field)"
    vars:
      query: |
        Our Solr schema has positionIncrementGap="100" on the text_general
        fieldType to prevent phrase matches across multi-valued field
        boundaries.

        What is the exact OpenSearch mapping parameter name for this?
        Where does it go — on the analyzer or on the field mapping?
        Show a mapping example.
    assert:
      - type: icontains
        value: "position_increment_gap"
        metric: correct-param-name

  # ═══════════════════════════════════════════════════════════════
