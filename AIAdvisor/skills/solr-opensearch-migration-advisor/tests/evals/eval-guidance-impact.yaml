description: "Guidance impact: prove steering content changes skill output"

# This eval proves that the steering documents in steering/ are not
# decorative — they measurably change the skill's output. Two providers
# run the SAME skill with the SAME SKILL.md, but one has an empty
# steering/ directory (bare) and the other has the full steering content.
#
# Expected result:
#   bare (no steering)    → all RED  (skill lacks expert knowledge)
#   guided (with steering) → all GREEN (steering provides it)
#
# Prerequisites:
#   cd AIAdvisor/skills/solr-opensearch-migration-advisor
#   uv sync --extra eval
#   source .venv/bin/activate
#   cp .env.example .env   # fill in CLAUDE_CODE_OAUTH_TOKEN
#   export PROMPTFOO_PYTHON=$(pwd)/.venv/bin/python
#
# Running:
#   cd tests/evals
#   promptfoo eval -c eval-guidance-impact.yaml
#   promptfoo view   # side-by-side: bare (red) vs guided (green)
#
#   # Export shareable report:
#   promptfoo eval -c eval-guidance-impact.yaml --output guidance-impact.html

providers:
  # Bare: real skill, but steering/ is empty — no expert guidance
  - id: 'file://claude_requests.py'
    label: 'bare (no steering)'
    config:
      cwd: fixtures/skill-bare
      timeout: 3000000

  # Guided: real skill with full steering/ content
  - id: 'file://claude_requests.py'
    label: 'guided (with steering)'
    config:
      timeout: 3000000

defaultTest:
  metadata:
    continue: false

prompts:
  - id: guidance-impact-scenario
    label: "Migration scenario"
    raw: "{{query}}"

tests:

  # ═══════════════════════════════════════════════════════════════
  #  5 tests that should FAIL without steering, PASS with steering.
  #
  #  Each tests a specific concept from steering/incompatibilities.md
  #  or steering/query_translation.md that a bare LLM won't produce
  #  with the right specificity.
  # ═══════════════════════════════════════════════════════════════

  - description: "function queries → script_score / function_score"
    vars:
      query: |
        I'm migrating a Solr 8 application to OpenSearch. We heavily use
        Solr function queries for custom scoring, including bf=recip(ms(NOW,release_date),3.16e-11,1,1)
        and bf=log(popularity). What are the OpenSearch equivalents?
        Be specific about the query DSL constructs to use.
    assert:
      - type: contains-any
        value:
          - "script_score"
          - "function_score"
          - "field_value_factor"
        metric: function-query-translation

  - description: "custom request handlers → no direct equivalent"
    vars:
      query: |
        Our Solr 8 setup has custom request handlers that combine search
        with business logic (inventory checks, personalization). We need
        to migrate these to OpenSearch. What's the equivalent?
    assert:
      - type: contains-any
        value:
          - "no direct equivalent"
          - "not directly equivalent"
          - "no equivalent"
          - "must rebuild"
          - "must be rebuilt"
          - "rebuild using"
          - "need to be rewritten"
          - "needs to be rewritten"
        metric: handler-incompatibility

  - description: "eDisMax qf → multi_match with field boosts"
    vars:
      query: |
        I need to translate this Solr eDisMax query to OpenSearch:
        defType=edismax
        q=dark knight
        qf=title^10 overview^5 cast^3 directors^3

        What is the exact OpenSearch query DSL?
    assert:
      - type: icontains
        value: "multi_match"
        metric: edismax-qf-translation
      - type: icontains
        value: "title^10"
        metric: field-boost-preserved

  - description: "highlighting hl.* → OpenSearch highlight config"
    vars:
      query: |
        Translate this Solr highlighting config to OpenSearch query DSL:
        hl=true
        hl.fl=title,overview
        hl.fragsize=150
        hl.snippets=3
        hl.simple.pre=<em>
        hl.simple.post=</em>

        Provide the exact OpenSearch JSON.
    assert:
      - type: icontains
        value: "fragment_size"
        metric: highlight-fragsize
      - type: icontains
        value: "number_of_fragments"
        metric: highlight-snippets
      - type: icontains
        value: "pre_tags"
        metric: highlight-tags

  - description: "Solr joins → terms lookup or denormalize"
    vars:
      query: |
        Our Solr app uses join queries between collections:
        {!join from=author_id to=id fromIndex=authors}name:Shakespeare

        How do we handle this in OpenSearch? Be specific about the approach.
    assert:
      - type: contains-any
        value:
          - "terms lookup"
          - "terms query"
          - "flattened"
          - "denormalize"
          - "denormalized"
          - "application-side"
          - "application side"
        metric: join-replacement
